trigger:
  - main

pool:
  name: 'TTS-Server'

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
    displayName: 'Install Node.js'

  - script: npm ci
    displayName: 'Install dependencies'

  - script: npm run build
    displayName: 'Build monorepo'
    env:
      NEXT_PUBLIC_SUPABASE_URL: $(NEXT_PUBLIC_SUPABASE_URL)
      NEXT_PUBLIC_SUPABASE_ANON_KEY: $(NEXT_PUBLIC_SUPABASE_ANON_KEY)

  - script: npm install -g @azure/static-web-apps-cli
    displayName: 'Install SWA CLI'

  - script: npx @azure/static-web-apps-cli deploy .next --deployment-token $(SWA_DEPLOYMENT_TOKEN) --env production
    workingDirectory: apps/web
    displayName: 'Deploy to Azure Static Web Apps'
